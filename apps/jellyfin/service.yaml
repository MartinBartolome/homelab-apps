# Web-UI – NodePort, erreichbar über jede Host-IP (u.a. Tailscale) ohne port-forward
# Zusätzlich explizit über den Tailscale Kubernetes Operator im Tailnet
# erreichbar unter jellyfin.<dein-tailnet>.ts.net (siehe apps/tailscale-operator/README.md)
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-web
  namespace: jellyfin
  labels:
    app: jellyfin
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "jellyfin"
spec:
  type: NodePort
  selector:
    app: jellyfin
  ports:
    - name: web
      port: 8096
      targetPort: 8096
      protocol: TCP
      nodePort: 30096
