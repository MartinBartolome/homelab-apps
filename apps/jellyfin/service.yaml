# Web-UI – NodePort, erreichbar über jede Host-IP (u.a. Tailscale) ohne port-forward
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-web
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  type: NodePort
  selector:
    app: jellyfin
  ports:
    - name: web
      port: 8096
      targetPort: 8096
      protocol: TCP
      nodePort: 30096
