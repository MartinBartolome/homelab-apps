apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate   # Nur eine Instanz, da Config/Cache per ReadWriteOnce gemountet ist
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.11
          envFrom:
            - configMapRef:
                name: jellyfin-config
          ports:
            - name: web
              containerPort: 8096
              protocol: TCP
          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
            - name: jellyfin-cache
              mountPath: /cache
            - name: filme
              mountPath: /media/Filme
              readOnly: true
            - name: serien
              mountPath: /media/Serien
              readOnly: true
            - name: videos
              mountPath: /media/Videos
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: jellyfin-cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        # NAS-Freigaben (CIFS/SMB) werden per Ansible (homelab-setup, Rolle "nas-mounts")
        # dauerhaft unter /mnt/nas/<Freigabe> auf dem k3s-Node gemountet und hier per
        # hostPath eingebunden (kein PVC nötig). Voraussetzung: nur ein k3s-Node.
        - name: filme
          hostPath:
            path: /mnt/nas/Filme
            type: Directory
        - name: serien
          hostPath:
            path: /mnt/nas/Serien
            type: Directory
        - name: videos
          hostPath:
            path: /mnt/nas/Videos
            type: Directory
