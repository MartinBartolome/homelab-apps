apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant
  strategy:
    type: Recreate   # Nur eine Instanz, da Config per ReadWriteOnce gemountet ist
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      # Matter-Kommissionierung (u.a. der TadoX-Bridge) basiert auf
      # mDNS/IPv6-Multicast im lokalen Netz. Das funktioniert über das
      # normale Pod-Overlay-Netzwerk von k3s nicht zuverlässig, daher läuft
      # der gesamte Pod im Host-Netzwerk (wie schon der NodePort-Zugriff auf
      # die Node-IP nahelegt). dnsPolicy muss dafür explizit umgestellt
      # werden, sonst funktioniert die Cluster-DNS-Auflösung (z.B. ArgoCD,
      # andere Services) im Pod nicht mehr.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        # Kopiert die Seed-configuration.yaml (ConfigMap) einmalig ins PVC –
        # nur beim allerersten Start, damit spätere Änderungen über die
        # HA-UI/den Datei-Editor nicht bei jedem ArgoCD-Sync überschrieben werden.
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/configuration.yaml ]; then
                echo "configuration.yaml nicht vorhanden, kopiere Seed..."
                cp /seed/configuration.yaml /config/configuration.yaml
              else
                echo "configuration.yaml bereits vorhanden, überspringe Seed."
              fi
          volumeMounts:
            - name: homeassistant-config
              mountPath: /config
            - name: config-seed
              mountPath: /seed
        # Installiert die (nicht in HA-Core enthaltenen) Custom-Integrationen
        # für Dreame-Staubsauger und Dyson-Luftreiniger direkt als
        # custom_components – ohne manuelle HACS-Installation. Läuft bei
        # jedem Pod-Start, klont aber nur, falls das jeweilige Verzeichnis
        # noch fehlt (idempotent, überschreibt keine Updates/Anpassungen).
        - name: install-custom-integrations
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache git
              mkdir -p /config/custom_components
              if [ ! -d /config/custom_components/dreame_vacuum ]; then
                echo "Installiere Dreame Vacuum Integration..."
                git clone --depth 1 https://github.com/Tasshack/dreame-vacuum.git /tmp/dreame-vacuum
                cp -r /tmp/dreame-vacuum/custom_components/dreame_vacuum /config/custom_components/
              else
                echo "Dreame Vacuum Integration bereits vorhanden, überspringe."
              fi
              if [ ! -d /config/custom_components/dyson_local ]; then
                echo "Installiere Dyson Integration..."
                git clone --depth 1 https://github.com/libdyson-wg/ha-dyson.git /tmp/ha-dyson
                cp -r /tmp/ha-dyson/custom_components/dyson_local /config/custom_components/
              else
                echo "Dyson Integration bereits vorhanden, überspringe."
              fi
          volumeMounts:
            - name: homeassistant-config
              mountPath: /config
      containers:
        - name: homeassistant
          image: ghcr.io/home-assistant/home-assistant:stable
          env:
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - name: web
              containerPort: 8123
              protocol: TCP
          volumeMounts:
            - name: homeassistant-config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
        # Matter Server: eigenständiger WebSocket-Dienst, mit dem sich die
        # "Matter"-Integration in HA verbindet (HA-Core spricht kein Matter
        # direkt). Wird für die Kommissionierung der TadoX-Bridge benötigt,
        # sobald diese Matter-Geräte an HA weiterreichen soll.
        # Läuft im selben Pod/Host-Netzwerk wie Home Assistant, daher aus
        # HA per "ws://localhost:5580/ws" erreichbar (siehe README.md).
        - name: matter-server
          image: ghcr.io/home-assistant-libs/python-matter-server:stable
          args:
            - --storage-path
            - /data
          ports:
            - name: matter-ws
              containerPort: 5580
              protocol: TCP
          volumeMounts:
            - name: matter-server-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: homeassistant-config
          persistentVolumeClaim:
            claimName: homeassistant-config
        - name: config-seed
          configMap:
            name: homeassistant-config-seed
        - name: matter-server-data
          persistentVolumeClaim:
            claimName: matter-server-data
