# DNS-Service (UDP+TCP Port 53) – NodePort damit der Host-DNS nutzbar ist
# Zusätzlich explizit über den Tailscale Kubernetes Operator im Tailnet
# erreichbar unter pihole-dns.<dein-tailnet>.ts.net:53 (siehe
# apps/tailscale-operator/README.md) – z.B. um Pi-hole als Nameserver im
# Tailnet (Tailscale Admin Console → DNS) zu hinterlegen.
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: pihole
  labels:
    app: pihole
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "pihole-dns"
spec:
  type: NodePort
  selector:
    app: pihole
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
      nodePort: 30053
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
      nodePort: 30053
---
# Web-UI – NodePort, erreichbar über jede Host-IP (u.a. Tailscale) ohne port-forward
# Zusätzlich explizit über den Tailscale Kubernetes Operator im Tailnet
# erreichbar unter pihole.<dein-tailnet>.ts.net (Port 80, kein NodePort nötig)
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: pihole
  labels:
    app: pihole
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "pihole"
spec:
  type: NodePort
  selector:
    app: pihole
  ports:
    - name: web
      port: 80
      targetPort: 80
      protocol: TCP
      nodePort: 30080
