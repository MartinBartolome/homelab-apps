# LoadBalancer (k3s ServiceLB) auf Standard-Port 80, damit der Browser ohne
# expliziten Port zugreifen kann. Voraussetzung: Traefik (k3s-Standard-Ingress,
# belegt sonst Port 80/443) ist deaktiviert, siehe homelab-setup/roles/k3s.
apiVersion: v1
kind: Service
metadata:
  name: nginx-web
  namespace: nginx
  labels:
    app: nginx
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: nginx
  ports:
    - name: web
      port: 80
      targetPort: 80
      protocol: TCP
