# NodePort, erreichbar über jede Host-IP (u.a. Tailscale) ohne port-forward.
# jellyfin.martinbartolome.ch wird per Pi-hole Local-DNS-Record auf die
# Tailscale-IP des Homelab-Hosts aufgelöst (siehe apps/nginx/README.md).
apiVersion: v1
kind: Service
metadata:
  name: nginx-web
  namespace: nginx
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: web
      port: 80
      targetPort: 80
      protocol: TCP
      nodePort: 30800
