apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: nginx
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      initContainers:
        - name: gen-self-signed-cert
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache openssl
              openssl req -x509 -nodes -days 3650 \
                -newkey rsa:2048 \
                -keyout /etc/nginx/certs/tls.key \
                -out /etc/nginx/certs/tls.crt \
                -subj "/CN=jellyfin.martinbartolome.ch"
          volumeMounts:
            - name: nginx-certs
              mountPath: /etc/nginx/certs
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: web
              containerPort: 80
              protocol: TCP
            - name: web-tls
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-certs
              mountPath: /etc/nginx/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: nginx-certs
          emptyDir: {}
