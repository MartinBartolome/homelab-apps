apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: nginx
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: web
              containerPort: 80
              protocol: TCP
            - name: web-tls
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-certs
              mountPath: /etc/nginx/certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        # Echtes (Sectigo-)Wildcard-Zertifikat für *.martinbartolome.ch,
        # bei IONOS gekauft/ausgestellt. Kommt bewusst NICHT aus Git (privater
        # Schlüssel!), sondern aus einem manuell angelegten Secret –
        # siehe README.md ("TLS-Zertifikat einspielen/erneuern").
        - name: nginx-certs
          secret:
            secretName: wildcard-martinbartolome-ch-tls
