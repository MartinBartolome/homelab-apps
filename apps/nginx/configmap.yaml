# Reverse-Proxy-Konfiguration: Vhosts nach Domain, damit weitere Apps
# einfach per zusätzlichem server{}-Block ergänzt werden können.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: nginx
data:
  jellyfin.conf: |
    server {
      listen 80;
      listen 443 ssl;
      server_name jellyfin.martinbartolome.ch;

      # Selbstsigniertes Zertifikat (siehe deployment.yaml initContainer) -
      # Browser zeigt eine Sicherheitswarnung, Verbindung ist aber verschlüsselt.
      ssl_certificate /etc/nginx/certs/tls.crt;
      ssl_certificate_key /etc/nginx/certs/tls.key;

      # Jellyfin braucht großzügige Timeouts/Buffer für Streaming
      client_max_body_size 20M;
      proxy_buffering off;

      location / {
        proxy_pass http://jellyfin-web.jellyfin.svc.cluster.local:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-Support (Jellyfin nutzt es für Live-Updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }
    }
