# Reverse-Proxy-Konfiguration: Vhosts nach Domain, damit weitere Apps
# einfach per zusätzlichem server{}-Block ergänzt werden können.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: nginx
data:
  jellyfin.conf: |
    # Reiner HTTP-Request (Port 80) wird immer auf HTTPS umgeleitet - ohne das
    # würde nginx die Seite auch unverschlüsselt ausliefern (z.B. wenn die
    # Domain ohne "https://" eingetippt wird), der Browser zeigt dann
    # "Not Secure" an, obwohl das TLS-Zertifikat korrekt ist.
    server {
      listen 80;
      server_name jellyfin.martinbartolome.ch;
      return 301 https://$host$request_uri;
    }
    server {
      listen 443 ssl;
      server_name jellyfin.martinbartolome.ch;

      # Echtes Wildcard-Zertifikat (Sectigo, via IONOS) für *.martinbartolome.ch
      # - öffentlich vertrauenswürdig, keine Zertifikatswarnung im Browser/App.
      # Herkunft/Erneuerung: siehe README.md.
      ssl_certificate /etc/nginx/certs/tls.crt;
      ssl_certificate_key /etc/nginx/certs/tls.key;

      # Jellyfin braucht großzügige Timeouts/Buffer für Streaming
      client_max_body_size 20M;
      proxy_buffering off;

      location / {
        proxy_pass http://jellyfin-web.jellyfin.svc.cluster.local:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-Support (Jellyfin nutzt es für Live-Updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }
    }
  homeassistant.conf: |
    # Reiner HTTP-Request (Port 80) wird immer auf HTTPS umgeleitet - siehe
    # Kommentar in jellyfin.conf.
    server {
      listen 80;
      server_name homeassistant.martinbartolome.ch;
      return 301 https://$host$request_uri;
    }
    server {
      listen 443 ssl;
      server_name homeassistant.martinbartolome.ch;

      # Echtes Wildcard-Zertifikat (Sectigo, via IONOS) für *.martinbartolome.ch
      # - öffentlich vertrauenswürdig, keine Zertifikatswarnung im Browser/App.
      # Herkunft/Erneuerung: siehe README.md.
      ssl_certificate /etc/nginx/certs/tls.crt;
      ssl_certificate_key /etc/nginx/certs/tls.key;

      location / {
        proxy_pass http://homeassistant-web.homeassistant.svc.cluster.local:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-Support (Home Assistant nutzt es für Live-Updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }
    }
