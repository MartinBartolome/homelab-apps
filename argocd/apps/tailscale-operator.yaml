apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    targetRevision: 1.98.4
    helm:
      values: |
        # ACL-Tag, mit dem sich der Operator selbst authentifiziert.
        # Muss in den Tailscale-ACLs unter tagOwners existieren.
        operatorConfig:
          defaultTags:
            - "tag:k8s-operator"
        # ACL-Tag für die Proxy-Pods, die der Operator für exponierte
        # Services/Ingresses erzeugt.
        proxyConfig:
          defaultTags: "tag:k8s"
        # OAuth-Credentials werden NICHT hier gesetzt, sondern manuell als
        # Secret "operator-oauth" im Namespace "tailscale" angelegt.
        # Siehe apps/tailscale-operator/README.md
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
